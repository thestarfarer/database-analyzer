<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>

  <!-- Chart bars representing revenue analysis -->
  <rect x="14" y="38" width="8" height="14" fill="#60a5fa" rx="1"/>
  <rect x="26" y="30" width="8" height="22" fill="#93c5fd" rx="1"/>
  <rect x="38" y="24" width="8" height="28" fill="#dbeafe" rx="1"/>

  <!-- Upward trend line -->
  <path d="M 12 48 L 24 38 L 36 32 L 48 20" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="48" cy="20" r="3" fill="#fbbf24"/>

  <!-- Dollar sign overlay -->
  <text x="32" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fef3c7" text-anchor="middle">$</text>
</svg>