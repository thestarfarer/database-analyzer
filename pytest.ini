[pytest]
# Pytest configuration for Database Analyzer Test Suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Add current directory to Python path
pythonpath = .

# Test directory
testpaths = tests

# Test markers
markers =
    unit: Fast unit tests for isolated components
    integration: Integration tests for component interactions
    e2e: End-to-end tests for complete workflows
    performance: Performance and load tests
    webui: WebUI-specific tests
    slow: Tests that take longer than 5 seconds
    database: Tests that require real database connection
    frontend: Frontend E2E tests requiring browser

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --code-highlight=yes
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --disable-warnings

# Timeout for tests (prevent hanging)
timeout = 300

[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */virtualenv/*
    */__pycache__/*
    */site-packages/*
    */webui/static/*
    */webui/templates/*

[coverage:report]
precision = 2
skip_empty = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
